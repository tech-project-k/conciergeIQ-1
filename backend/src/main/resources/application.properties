# Server configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (Defaults to in-memory H2 database, overridable with env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:conciergeiq;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Web Console (accessible at /api/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# AI Keys
openai.api.key=${OPENAI_API_KEY:}
openai.api.base=${OPENAI_API_BASE:https://api.openai.com/v1}
