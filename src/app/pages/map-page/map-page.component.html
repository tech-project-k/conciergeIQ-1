<section class="map-page">

    <div class="overlay"></div>

    <div class="map-content">

        <h1> Explore Destinations</h1>

        <p>
            Find nearby hotels, restaurants, tourist attractions and events.
        </p>

        <!-- Search Bar -->
        <div class="search-box">

            <input
                type="text"
                placeholder="Search destination...">

            <button>
                <i class="bi bi-search"></i>
            </button>

        </div>

        <!-- Google Map -->
        <div class="map-box">

            <iframe
                src="https://www.google.com/maps?q=India&output=embed"
                loading="lazy">
            </iframe>

        </div>

        <!-- Nearby Hotels -->
        <div class="place-section">

            <h2> Nearby Hotels</h2>

            <div class="place-cards">

                <div class="place-card">Taj Palace</div>
                <div class="place-card">ITC Grand</div>
                <div class="place-card">Novotel</div>

            </div>

        </div>

        <!-- Nearby Restaurants -->
        <div class="place-section">

            <h2> Nearby Restaurants</h2>

            <div class="place-cards">

                <div class="place-card">Paradise</div>
                <div class="place-card">Chutneys</div>
                <div class="place-card">Barbeque Nation</div>

            </div>

        </div>

        <!-- Nearby Events -->
        <div class="place-section">

            <h2> Nearby Events</h2>

            <div class="place-cards">

                <div class="place-card">Food Festival</div>
                <div class="place-card">Music Concert</div>
                <div class="place-card">Beach Carnival</div>

            </div>

        </div>

        <button class="back-btn" routerLink="/">
            ← Back to Home
        </button>

    </div>

</section>
