<section id="contact" class="contact">

    <div class="section-title">
        <span>CONTACT US</span>
        <h2>Share Your Experience</h2>
        <p>We would love to hear your valuable feedback and travel experience.</p>
    </div>

    <div class="contact-container">

        <!-- Contact Info -->
        <div class="contact-info">

            <h3>Get In Touch</h3>

            <p>
                Our travel experts are always ready to help you plan
                your perfect journey.
            </p>

            <div class="info-box">
                <i class="bi bi-geo-alt-fill"></i>
                <span>Mumbai, India</span>
            </div>

            <div class="info-box">
                <i class="bi bi-envelope-fill"></i>
                <span>jahnavikandrekula77@gmail.com</span>
            </div>

            <div class="info-box">
                <i class="bi bi-telephone-fill"></i>
                <span>+91 7207561839</span>
            </div>

        </div>

        <!-- Feedback Form -->
        <form
            class="contact-form"
            action="https://formspree.io/f/xdaqejzg"
            method="POST">

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="text"
                name="destination"
                placeholder="Destination">

            <input
                type="text"
                name="hotel"
                placeholder="Hotel Name">

            <select name="rating" required>
                <option value="">Overall Rating </option>
                <option value="5"> Excellent</option>
                <option value="4"> Very Good</option>
                <option value="3"> Good</option>
                <option value="2"> Average</option>
                <option value="1"> Poor</option>
            </select>

            <textarea
                name="feedback"
                rows="6"
                placeholder="Write your feedback..."
                required></textarea>

            <button type="submit">
                <i class="bi bi-send-fill"></i>
                Submit Feedback
            </button>

        </form>

    </div>

</section>
